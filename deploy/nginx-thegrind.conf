# Optional: serve THE GRIND over trusted local HTTPS at a custom domain.
# Copy into your nginx sites and reload. See the README "Pretty local HTTPS"
# section for the full walkthrough (dnsmasq + mkcert + nginx).
#
# Assumes:
#   - the app (server.mjs) is running on 127.0.0.1:47417
#   - an mkcert cert exists at the paths below
#   - :8443 is used so nginx needs no root; use :443 only via a root daemon
#
server {
    server_name thegrind.test;

    listen [::]:8443 ssl;
    listen 8443 ssl;
    ssl_certificate     /opt/homebrew/etc/nginx/ssl/thegrind.pem;
    ssl_certificate_key /opt/homebrew/etc/nginx/ssl/thegrind-key.pem;

    location / {
        proxy_pass http://127.0.0.1:47417;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
